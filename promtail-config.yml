server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: bot-manager
    static_configs:
      - targets:
          - localhost
        labels:
          job: bot-manager
          __path__: /logs/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            botGroupId: botGroupId
            environmentId: environmentId
            gameType: gameType
      - timestamp:
          source: timestamp
          format: "2006-01-02T15:04:05.000Z0700"
      - labels:
          level:
          botGroupId:
          environmentId:
          gameType:
