# src/main/resources/application.properties

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/botmanager

server.port=8085

# Change the path for Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# Change the path for OpenAPI docs
springdoc.api-docs.path=/v3/api-docs

# Set a custom server URL (optional)
springdoc.api-docs.server.url=http://localhost:8085

# Netty EventLoopGroup Configuration
# Number of threads for WebSocket event loop
# Production (few hundred bots): 2-4 threads
# Load testing (hundreds of thousands): 16-32 threads or higher
websocket.eventloop.threads=4

# Game Microservice Configuration
# Global URL for game microservice (used by GameMsClient for deposits)
gamems.url=http://gamems.dev:5007

# Prometheus Configuration
# Base URL bot-manager uses to query Prometheus for the metrics API
# (PrometheusQueryClient). Compose service name on the internal network.
# Internal-only — never exposed to the UI.
prometheus.url=http://prometheus:9090

# Metrics API caching (METRICS_API AD-8). Short server-side TTL on Prometheus
# query results so polling UI clients don't amplify load onto Prometheus.
# Dependency-free in-process cache; 0 disables caching.
metrics.cache.ttl-seconds=5

# Metrics API rate limit (METRICS_API AD-9). Per-client (per-IP) token-bucket
# guard on /api/v1/metrics/** — these are public+unauthenticated and hit
# Prometheus, so cap the request rate. Exceeding the limit returns HTTP 429.
metrics.ratelimit.requests-per-minute=120

# RTP window substitution (METRICS_IMPROVEMENT AD-6). RTP templates store the
# Grafana-only $__range token; MetricsQueryService swaps it for these concrete
# windows before dispatch (the token must never reach Prometheus).
# summary-window: instant query window for the headline long-term RTP (= retention).
metrics.rtp.summary-window=30d
# timeseries-window: per-point sliding window for the RTP chart.
metrics.rtp.timeseries-window=1h

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,loggers,prometheus
management.endpoint.health.show-details=always
# Common tag applied to every Micrometer meter so Prometheus can distinguish
# bot-manager metrics from other apps that might share the scrape target list.
management.metrics.tags.application=bot-manager
# Spring Boot 3.x: enable Prometheus registry export. Defaults to true when the
# dependency is on the classpath; setting it explicitly guards against future
# default changes.
management.prometheus.metrics.export.enabled=true
springdoc.show-actuator=true

# IP address sent in all login and registration request bodies
# Replace with server's actual IP once it is whitelisted
bot.ip=16.162.36.69

# Periodic Logout Configuration
# Enables periodic logout/reconnect cycle for bots to refresh connections
bot.periodic-logout.enabled=true
# Interval between logout cycles in minutes (one bot logs out per interval, round-robin)
bot.periodic-logout.interval-minutes=60
# Delay in seconds between logout and reconnect
bot.periodic-logout.reconnect-delay-seconds=5

# Timed Activation Configuration (TIMED_ACTIVATION AD-5, AD-8)
# App-wide business wall-clock zone the recurring activation windows are interpreted in.
# Explicitly configured (not server-local) so it is stable across Docker instances
# regardless of container TZ. Read in exactly one place (the reconciler).
bot.activation.zone=Asia/Ho_Chi_Minh
# Reconcile cadence in seconds. Default 60 = minute granularity; the first tick is
# aligned to the next wall-clock minute boundary so window edges flip on clean marks.
bot.activation.tick-seconds=60

# Reconnection Configuration
# Seconds without any game message before the watchdog triggers a full bot reconnect
bot.watchdog.timeout.seconds=180
# Fraction (0.0–1.0) of DEAD bots required before the entire group is marked DEAD
bot.group.dead.threshold=0.80