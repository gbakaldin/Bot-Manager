apiVersion: 1

# Grafana dashboards provisioning provider.
#
# Phase 1 of docs/plans/OBSERVABILITY.md only stands up the provider so that
# Phase 6 can drop dashboard JSON files into this directory and have Grafana
# pick them up automatically on container restart. The provider scans
# /etc/grafana/provisioning/dashboards/ for *.json files; no dashboards exist
# here yet.
providers:
  - name: bot-manager-dashboards
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
